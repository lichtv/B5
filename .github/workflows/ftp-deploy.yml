name: 🚀 Tự động đồng bộ FTP

on:
  push:
    branches:
      - main  # Thay bằng 'master' nếu bạn dùng tên branch cũ

jobs:
  web-deploy:
    name: 🚚 Deploy Landing Page
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Lấy code mới nhất
      uses: actions/checkout@v4
    
    # MẸO: Nếu bạn dùng Vite/React/Next.js, hãy bỏ dấu # ở các dòng dưới để hệ thống build trước khi upload
    # Bước chuẩn bị file (đã tắt để ưu tiên index.html bạn đang sửa)
    # - name: 🏗️ Chuẩn bị file
    #   run: |
    #     cd .stitch/designs
    #     cp new_index.html index.html
    
    - name: 📤 Upload qua FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        local-dir: ./.stitch/designs/
        server-dir: public_html/B5/ # Chuyển vào public_html để hiển thị được trên web
