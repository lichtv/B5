name: 🚀 Tự động đồng bộ FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚚 Deploy VietnamMade Landing Page
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Lấy code mới nhất
      uses: actions/checkout@v4

    - name: 📤 Upload qua FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        local-dir: ./.stitch/designs/VietnamMade/
        server-dir: VietnamMade/
